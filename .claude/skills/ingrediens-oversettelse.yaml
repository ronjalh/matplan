  ### Layer 2: Fuzzy Search Fallback (Fase 2, covers ~15% more)
  If not in translation table:
  1. Try searching Kassalapp with the English name directly (works for: "parmesan", "mozzarella", "basil", "mango", etc.)
  2. Try partial match: "chicken" → search "kylling" (common root)
  3. Try removing adjectives: "fresh basil" → "basil" → "basilikum"

  ### Layer 3: User-Learned Links (grows over time)
  ```
  ingredientProductLinks:
    id, userId, ingredientNameEN, ingredientNameNO, storeProductId, provider, lastUsed
  ```
  When a user manually links an ingredient → save it. Next time → use saved link.
  Over time the system learns from all users' choices.

  ## Translation Flow
  ```typescript
  function translateIngredient(englishName: string, userId: string): string {
    // 1. Check user's saved links first
    const userLink = await db.query.ingredientProductLinks.findFirst({
      where: eq(ingredientProductLinks.ingredientNameEN, normalize(englishName))
    });
    if (userLink) return userLink.ingredientNameNO;

    // 2. Check static translation table
    const translated = ingredientTranslations[normalize(englishName)];
    if (translated) return translated;

    // 3. Try direct search (some words are same/similar)
    // This is attempted during the Kassalapp search itself

    // 4. Return original (user will need to link manually)
    return englishName;
  }

  function normalize(name: string): string {
    return name.toLowerCase().trim()
      .replace(/\s+/g, ' ')
      .replace(/s$/, '');  // basic depluralize
  }
  ```

  ## Rules
  - ALWAYS try translation table before API search
  - ALWAYS normalize ingredient names (lowercase, trim, depluralize)
  - NEVER silently skip untranslated ingredients — show them to the user
  - The translation table is a STARTING POINT — it grows through user interactions
  - Handle plurals: "tomatoes" → "tomatoes" → strip "s" → "tomato" → "tomat"
  - Some words are identical: "mango", "pasta", "quinoa" — these work without translation
