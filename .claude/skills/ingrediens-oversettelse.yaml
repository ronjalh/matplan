instructions: |
  # Ingrediens-oversettelse — EN→NO Matching

  ## Problem
  Spoonacular returns English ingredient names ("chicken breast").
  Kassalapp/Oda have Norwegian products ("Kyllingfilet Prior 550g").
  We need to bridge this gap.

  ## Three-Layer Strategy

  ### Layer 1: Static Translation Table (~200 entries, covers ~80%)
  File: `src/data/ingredient-translations.ts`

