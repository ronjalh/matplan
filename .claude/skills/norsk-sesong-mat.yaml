  ## What "In Season" Means for the App
  - **In season (i sesong):** Currently being harvested in Norway → badge: 🌱 green
  - **From storage (lagervare):** Norwegian-grown but from cold storage → badge: 📦 blue
  - **Imported (import):** Not available from Norwegian sources → badge: ❄ grey
  - **Greenhouse (drivhus):** Norwegian greenhouse production → badge: 🏠 teal

  ## How to Use in Meal Planning
  1. When user adds ingredient to recipe: show seasonal status for current month
  2. In meal suggestions: prioritize in-season ingredients
  3. On shopping list: highlight in-season items (likely cheaper and fresher)
  4. Sesong page (`/sesong`): monthly grid showing what is available NOW
  5. Cost correlation: in-season items from Oda are typically cheaper

  ## Rules
  - ALWAYS check the month when showing seasonal status — January ≠ July
  - Storage produce is still "Norwegian" — mark as lagervare, not import
  - Wild berries (blåbær, tyttebær, multer) have short seasons — be precise
  - Greenhouse production (tomat, agurk, salat) can extend the season but note it
