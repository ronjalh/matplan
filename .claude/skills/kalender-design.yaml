  ## Month View Layout
  Compact grid. Each day cell shows:
  - Meal count indicator (0-4 dots)
  - Event count (small number badge if > 0)
  - Today highlighted with primary color ring
  - Norwegian holidays in red

  ## Event Color Coding
  Each event type has a left-border color:
  | Event Type  | Border Color      | Width |
  |-------------|-------------------|-------|
  | MГҘltid      | --color-primary   | 3px   |
  | Aktivitet   | --color-fish      | 3px   |
  | Avtale      | --color-accent    | 3px   |
  | PГҘminnelse  | --color-warning   | 3px   |
  | Hendelse    | --color-text-muted| 3px   |

  ## Overlapping Events
  When multiple events occupy the same time:
  - Stack side-by-side (up to 3)
  - If > 3: show first 2 + "+N more" badge
  - Meals always take priority in visual ordering

  ## Mini Calendar (sidebar)
  - Small month grid for quick date navigation
  - Dot indicators under dates that have events
  - Today highlighted, selected date has primary bg
  - Click a date вҶ’ navigates main calendar to that date

  ## Norwegian Holidays (RГёde Dager)
  Must be marked in the calendar:
  | Date        | Holiday (nb)                | Holiday (en)          |
  |-------------|-----------------------------|-----------------------|
  | 1. januar   | NyttГҘrsdag                  | New Year's Day        |
  | Variable    | SkjГҰrtorsdag                | Maundy Thursday       |
  | Variable    | Langfredag                  | Good Friday           |
  | Variable    | 1. pГҘskedag                 | Easter Sunday         |
  | Variable    | 2. pГҘskedag                 | Easter Monday         |
  | 1. mai      | Arbeidernes dag             | Labour Day            |
  | 17. mai     | Grunnlovsdag                | Constitution Day      |
  | Variable    | Kristi himmelfartsdag       | Ascension Day         |
  | Variable    | 1. pinsedag                 | Whit Sunday           |
  | Variable    | 2. pinsedag                 | Whit Monday           |
  | 25. desember| 1. juledag                  | Christmas Day         |
  | 26. desember| 2. juledag                  | St. Stephen's Day     |

  Display: red text for date, holiday name shown on hover/tap.

  ## Week Numbers
  - Always display ISO 8601 week numbers
  - Format: "Uke 14" (nb) / "Week 14" (en)
  - Calculate with: `getISOWeek()` from date-fns or equivalent

  ## Animations
  - View transitions: slide left/right when navigating days/weeks
  - Card add: fade-in with slight scale
  - Drag-and-drop: card lifts with shadow, target slot highlights
  - Respect `prefers-reduced-motion`
