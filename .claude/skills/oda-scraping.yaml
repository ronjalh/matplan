name: oda-scraping
description: Playwright scraping patterns for Oda.com — selectors, rate limiting, price normalization, and error handling
version: 1.0.0
tags: [scraping, oda, playwright, prices]

instructions: |
  # Oda.com Scraping

  ## Overview
  Oda.com is a Norwegian online grocery store. It is a React SPA — simple HTTP fetching returns empty shells. We use Playwright (headless Chromium) to render pages and extract product data.

  ## Scraping Targets
  | Data           | Where to find                    |
  |----------------|----------------------------------|
  | Product name   | Product card title               |
  | Price (NOK)    | "kr XX,XX" on product card       |
  | Unit price     | "kr XX,XX/kg" or "/stk" or "/l"  |
  | Weight/volume  | Product subtitle or detail page  |
  | Category       | URL path segment                 |
  | Product URL    | `https://oda.com/no/products/XXXXX-slug/` |
  | Image URL      | Product card image `src`         |

  ## URL Patterns
  - Category browse: `https://oda.com/no/categories/XXXX-category-name/`
  - Product detail: `https://oda.com/no/products/XXXXX-product-slug/`
  - Search: `https://oda.com/no/search/?q=QUERY`

  ## Key Categories to Scrape
  | Norwegian Category | Expected Products |
  |-------------------|-------------------|
  | Frukt og grønt    | ~200              |
  | Fisk og sjømat    | ~80               |
  | Kjøtt og kylling  | ~150              |
  | Meieriprodukter   | ~200              |
  | Brød og bakervarer| ~100              |
  | Ris, pasta, gryn  | ~80               |

  ## Rate Limiting (CRITICAL)
  - **Minimum 2 seconds** between page loads
  - **Maximum 50 pages** per scrape session
  - Add jitter: `delay = 2000 + Math.random() * 1000` ms
  - Set User-Agent: `Matplan/1.0 (personal meal planner)`
  - Respect robots.txt
  - NEVER run concurrent page loads

  ## Price Normalization
  - Parse Norwegian number format: "49,90" → 49.90
  - Normalize unit prices to kr/kg when possible
  - Store amounts as integers in øre (4990 = kr 49,90) to avoid floating point
  - Handle "ca. X kg" packaging (variable weight products)
  - Price history: append `{ date: ISO-string, priceOre: number }` to JSON array

  ## Error Handling
  - **Selector changed:** Log warning, skip product, don't crash the scrape
  - **Rate limited / blocked:** Back off exponentially (5s, 10s, 20s), max 3 retries then abort
  - **Network error:** Retry once after 5s, then skip
  - **Empty results:** If category returns 0 products, it's likely a layout change — alert user

  ## Cache Strategy
  - Save raw HTML to `scraper-cache/{category}/{timestamp}.html`
  - Cache is gitignored
  - On parse failure: re-parse from cache without re-scraping
  - Cache expires after 7 days (delete old snapshots)

  ## Data Flow
  1. Playwright loads category page → waits for product cards to render
  2. Parser extracts product data from DOM
  3. price-updater upserts into `odaProducts` table (match on odaId)
  4. New products get `ingredientId = null` — user links them manually or via fuzzy name matching
  5. node-cron triggers weekly scrape (Saturday 06:00)

  ## Playwright Setup
  ```typescript
  // Use persistent browser context to avoid re-downloading browser
  const browser = await chromium.launch({ headless: true });
  const context = await browser.newContext({
    locale: 'nb-NO',
    userAgent: 'Matplan/1.0 (personal meal planner)',
  });
  ```

  ## Rules
  - NEVER scrape without rate limiting — respect Oda's servers
  - NEVER store Oda account credentials or session tokens
  - NEVER scrape in parallel (one page at a time)
  - ALWAYS provide manual price entry as fallback when scraper fails
  - ALWAYS log scrape results: products found, updated, errors
  - The scraper is a CONVENIENCE feature — the app must work without it
